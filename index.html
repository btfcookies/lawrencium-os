<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lawrencium OS</title>
  <link rel="stylesheet" href="index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">

</head>
<body style="background-color: #000;  background-image: url(./arch.png)">
  <div class="top-bar text">
    <p style="cursor: pointer" id="welcomeopen">LawrenciumOS</p>
    <p id="timeElement">Time</p>
  </div>

  <div class="welcome-window" id="welcome-window" >
    <div id="welcome-windowheader" class="welcome-windowheader">
      <img class="closeButton" id="welcomeClose" src="close.png"></img>
    </div>
    <h1 style="color: green" class="text">Welcome to Lawrencium OS</h1>
    <h2 style="color: green;" class="text">Created by <a class="text" href="https://github.com/btfcookies" style="color: green;">@btfcookies</a></h2>
    <a href="https://github.com/btfcookies/lawrencium-os" style="color: green;" class="text">View Github</a>
   </div>
   <img src="clash-of-clans.gif" alt="Goblin GIF" width="200" height="200" class="gif" id="gif">
    <div class="dock">
      <div id="desktopApps" class="desktopApps">
        <div class="appIcon selected">
          <img src="notepad.jpg" alt="Icon" class="icon">
        </div>
      </div>
    </div>
  </div>

  <div class="notepad-window" id="notes"></div>

  
  <script src="script.js"></script>
</body>
</html>
